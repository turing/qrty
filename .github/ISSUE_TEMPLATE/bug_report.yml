name: Bug report
description: Something qrty does wrong.
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you expected vs. what actually happened.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact `qrty …` command you ran.
    validations:
      required: true
  - type: input
    id: qrty-version
    attributes:
      label: qrty version
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
    validations:
      required: true
  - type: textarea
    id: profile
    attributes:
      label: Profile JSON
      description: If a profile is involved, paste it here.
      render: json
    validations:
      required: false
